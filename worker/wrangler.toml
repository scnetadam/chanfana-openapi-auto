name = "x402-alipay"
main = "src/worker.js"
compatibility_date = "2025-03-01"

# KV — id is inserted by CI workflow (deploy-worker.yml)
[[kv_namespaces]]
binding = "X402_ORDERS"
id = ""

[vars]
SITE = "https://x402-alipay.dev"

[triggers]
crons = []

# Secrets (set via GitHub Actions or wrangler secret put):
# ALIPAY_APP_ID          - 支付宝沙箱 APPID
# ALIPAY_APP_PRIVATE_KEY - 应用私钥 (PKCS8, \n 代替换行)
# ALIPAY_PUBLIC_KEY      - 支付宝公钥

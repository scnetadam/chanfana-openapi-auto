name: Deploy to CloudBase

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify project structure
        run: |
          echo "=== CloudBase Deploy Info ==="
          echo "EnvID: d1g9iojop685ea11a"
          echo "Service: guiniu-xin"
          echo "Domain: guiniu-xin-281816-7-1306394233.sh.run.tcloudbase.com"
          echo "=== Key Files ==="
          ls -la cloudbaserc.json Dockerfile.cloudbase supervisord.conf server.py src/index.js
          echo "=== Dockerfile.cloudbase ==="
          cat Dockerfile.cloudbase
          echo "=== Build verified, CloudBase will auto-pull from GitHub main ==="

      - name: Test Docker Build
        run: |
          docker build -f Dockerfile.cloudbase -t guiniu-xin-test . 2>&1 | tail -20

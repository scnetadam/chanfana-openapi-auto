# 龟钮体系 — Nginx 反向代理配置
# 腾讯云CVM: 159.75.17.54 | 域名: x402.chinaauto.ccwu.cc
# Cloudflare Origin CA SSL (15年有效期)
# 部署位置：/etc/nginx/conf.d/guiniu.conf

# ========== 上游服务 ==========

# 龟钮·印信 — X402 支付（后端 port 3000）
upstream guiniu-seal {
    server 127.0.0.1:3000;
    keepalive 16;
}

# 龟钮·印证 — 数据存证集市（后端 port 3001）
upstream guiniu-verify {
    server 127.0.0.1:3001;
    keepalive 16;
}

# 龟钮·印鉴/自驭 — 汽车 AI 智能体（后端 port 3003）
upstream guiniu-deveco {
    server 127.0.0.1:3003;
    keepalive 16;
}

# ========== HTTPS 服务器 ==========
server {
    listen 443 ssl http2;
    server_name x402.chinaauto.ccwu.cc *.chinaauto.ccwu.cc;

    # Cloudflare Origin CA 证书
    ssl_certificate     /etc/nginx/ssl/cloudflare-origin.pem;
    ssl_certificate_key /etc/nginx/ssl/cloudflare-origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Cloudflare 真实IP恢复
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    # 安全头
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ========== 路由规则 ==========

    # 龟钮·印信 — X402 支付 (port 3000)
    location /api/x402/ {
        proxy_pass http://guiniu-seal/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    # 龟钮·印证 — 数据存证集市 (port 3001)
    location /api/verify/ {
        proxy_pass http://guiniu-verify/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    # 龟钮·自驭 — 汽车 AI 智能体 (port 3003, AI 流式响应)
    location /api/deveco/ {
        proxy_pass http://guiniu-deveco/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    # 全局 API 入口（兼容旧路径 /api/ → 默认路由到龟钮印信）
    location /api/ {
        proxy_pass http://guiniu-seal/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
    }

    # CVM 自动控制接口
    location /autocvm/ {
        proxy_pass http://127.0.0.1:8080/autocvm/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 健康检查
    location /health {
        return 200 '{"status":"ok","project":"guiniu","domain":"x402.chinaauto.ccwu.cc","ssl":"cloudflare-origin-ca","version":"3.0.0"}';
        add_header Content-Type application/json;
    }

    location / {
        return 200 '{"status":"ok","project":"guiniu","domain":"x402.chinaauto.ccwu.cc"}';
        add_header Content-Type application/json;
    }
}

# HTTP 重定向到 HTTPS（Cloudflare 也会强制HTTPS，此处为直连兜底）
server {
    listen 80;
    server_name x402.chinaauto.ccwu.cc *.chinaauto.ccwu.cc;

    # Cloudflare 健康检查兼容
    location /health {
        return 200 '{"status":"ok","project":"guiniu","version":"3.0.0"}';
        add_header Content-Type application/json;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}